# General settings
backend = "xrender";  # Choose 'xrender' or 'glx'
vsync = true;         # Enable vsync to prevent tearing

# Shadow settings
shadow = false;              # Disable shadows
shadow-radius = 12;          # Radius of the shadow
shadow-offset-x = -15;       # X offset of the shadow
shadow-offset-y = -15;       # Y offset of the shadow
no-dnd-shadow = true;        # Disable shadows for DnD windows

# Fading settings
fading = true;               # Enable fading
fade-in-step = 0.08;         # Fade in speed
fade-out-step = 0.08;        # Fade out speed
fade-exclude = [             # Exclude certain windows from fading
  "class_g = 'Notification'",
];

# Frame opacity
frame-opacity = 1;           # Opacity of window frames

# Window rules
active-opacity = 1;          # Opacity for active windows
inactive-opacity = 0.9;      # Opacity for inactive windows

# Setup for transparency
detect-client-opacity = true; # Detect client opacity

# Rounded corners
rounded-corners = true;      # Enable rounded corners
corner-radius = 12;          # Set corner radius (adjust as needed)

rounded-corners-exclude = [
  "window_type = 'dock'"
];

# Other settings
no-fading-openclose = true;  # Disable fade effects on open/close
menu-dim = 0.7;              # Dim the menu
