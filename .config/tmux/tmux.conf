# Set the prefix to Ctrl+A
set -g prefix M-m
unbind C-b
bind M-m send-prefix

# Enable mouse support
set -g mouse on

# Use vim keybindings in copy mode
setw -g mode-keys vi

# Split panes using | and -
bind | split-window -h
bind - split-window -v

# Create and Switch Between Windows
bind -n M-t new-window -c "#{pane_current_path}"
bind -n M-q previous-window
bind -n M-e next-window
bind -n M-k killp


# Create and Swtich Between Sessions
bind -n M-T new-session -c "#{pane_current_path}"
bind -n M-Q switch-client -p
bind -n M-E switch-client -n
bind -n M-K kill-session


# Set Options
set -g default-terminal "screen-256color"
set -g terminal-overrides 'xterm*:Tc'
set -g default-shell /usr/bin/zsh
set -g detach-on-destroy off

# Set Window Status Options
set -g window-status-current-format ' #[fg=yellow] #W '
set -g window-status-format ' #[fg=cyan] #W '
set -g window-status-separator '|'

set -g status-right-length 50
set -g status-left-length 50
set -g status-justify centre

# Set To Rename to Current Path
set-option -g automatic-rename-format '#{b:pane_current_path}'
set-option -g automatic-rename on
set-option -g status-interval 1

# Customize status bar
set -g status-right "#[fg=green]#(whoami)@#(hostname) #[fg=white]| #[fg=cyan]%H:%M:%S"
set -g status-left "#[fg=green] #S #[fg=white]| "

set -g status-right-length 50
set -g status-left-length 50

set -g status-bg black
set -g status-fg white

# Reload config
bind -n M-R source-file ~/.config/tmux/tmux.conf \; display "Config reloaded!"
